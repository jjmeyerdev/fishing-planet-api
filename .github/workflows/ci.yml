name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Route tests mock src/db.js, so no real database is needed; this dummy value
    # just keeps prisma generate / prisma.config.ts from reading an unset var.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v7

      # Version comes from package.json "packageManager"; don't also set it here
      # or pnpm/action-setup errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

  # End-to-end smoke test: build the image, bring up Postgres + migrations, and
  # run a /api/fish CRUD round-trip through the compose network. High published
  # ports avoid clashing with anything on the runner; the test reaches the app
  # over the compose network regardless.
  smoke:
    runs-on: ubuntu-latest
    env:
      APP_PORT: 18080
      DB_PORT: 15432
    steps:
      - uses: actions/checkout@v7

      - run: docker compose --profile test run --build --rm test

      - if: always()
        run: docker compose --profile test down -v
