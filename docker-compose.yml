# Local stack: Postgres + the API. Credentials default to the .env.example
# values and can be overridden via a .env file or the shell environment.
#
# Usage:
#   docker compose up -d --build          # Postgres → migrations (init) → API on :8080
#   docker compose --profile seed up --build seed   # (optional) load data/ into the DB
#
# The app image has no Prisma CLI, so the one-shot `init` service (builder image)
# applies the committed migrations before the app starts, and the `seed` service
# runs the seed scripts — no host Prisma commands required.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fishing_planet}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-fishing_planet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply committed migrations before the app starts, then exit. Uses
  # the builder stage, which has the Prisma CLI (the slim runtime image does not).
  init:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-fishing_planet}?schema=public
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  # One-shot data load (seed profile, not started by a normal up). Reuses the
  # builder image but bind-mounts data/ and scripts/ — both kept out of the slim
  # image — and runs the seed scripts. Waits for init so the tables exist.
  # Idempotent (upserts). Run with:
  #   docker compose --profile seed up --build seed
  seed:
    build:
      context: .
      target: builder
    profiles: ["seed"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-fishing_planet}?schema=public
    volumes:
      - ./data:/app/data:ro
      - ./scripts:/app/scripts:ro
    command: ["sh", "-c", "pnpm seed && pnpm seed:biting && pnpm seed:gear && pnpm seed:fp && pnpm seed:spots"]
    restart: "no"
    depends_on:
      init:
        condition: service_completed_successfully

  app:
    build: .
    # Give the app's own drain (SHUTDOWN_TIMEOUT_MS, default 10s) room before
    # Docker escalates SIGTERM to SIGKILL.
    stop_grace_period: 15s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-fishing_planet}?schema=public
      PORT: 8080
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      # Writes require this key; reads stay public. Empty would disable auth.
      API_KEYS: ${API_KEYS:-local-dev-key}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      # /ready pings the DB (503 when unreachable), so the app is only "healthy"
      # once it can actually serve — not merely once the process is up.
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Smoke test that runs only once the app reports healthy. Not started by a
  # normal `up` (test profile). Exercises the DB via a /api/fish CRUD round-trip
  # (self-cleaning, so it needs no seed and is rerun-safe). Run it — the exit
  # code is the test's — with:
  #   docker compose --profile test run --build --rm test
  # (Use `run`, not `up --abort-on-container-exit`: the one-shot init container
  # exits 0 early, which would abort the stack out from under the test.)
  test:
    image: node:22-alpine
    profiles: ["test"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:8080
      API_KEY: ${API_KEYS:-local-dev-key}
    command:
      - node
      - -e
      - |-
        (async () => {
          const base = process.env.BASE_URL
          const name = 'Smoke Test Fish'
          const auth = { 'content-type': 'application/json', authorization: 'Bearer ' + process.env.API_KEY }
          let r = await fetch(base + '/health')
          if (r.status !== 200) throw new Error('health ' + r.status)
          r = await fetch(base + '/api/fish')
          if (r.status !== 200) throw new Error('list ' + r.status)
          const page = await r.json()
          if (!Array.isArray(page.data) || typeof page.total !== 'number') throw new Error('list is not a paginated envelope')
          const list = page.data
          const stale = list.find((f) => f.commonName === name)
          if (stale) await fetch(base + '/api/fish/' + stale.id, { method: 'DELETE', headers: auth })
          r = await fetch(base + '/api/fish', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ commonName: name }) })
          if (r.status !== 401) throw new Error('expected 401 for unauthenticated create, got ' + r.status)
          r = await fetch(base + '/api/fish', { method: 'POST', headers: auth, body: JSON.stringify({ commonName: name }) })
          if (r.status !== 201) throw new Error('create ' + r.status)
          const created = await r.json()
          r = await fetch(base + '/api/fish/' + created.id)
          if (r.status !== 200) throw new Error('get ' + r.status)
          r = await fetch(base + '/api/fish/' + created.id, { method: 'DELETE', headers: auth })
          if (r.status !== 204) throw new Error('delete ' + r.status)
          console.log('smoke tests passed: health + /api/fish CRUD round-trip (auth enforced, ' + page.total + ' fish total)')
        })().catch((e) => { console.error('FAIL', e.message); process.exit(1) })

volumes:
  pgdata:
