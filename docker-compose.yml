# Local stack: Postgres + the API. Credentials default to the .env.example
# values and can be overridden via a .env file or the shell environment.
#
# Usage:
#   docker compose up -d db            # start Postgres
#   pnpm db:push && pnpm seed          # create schema + (optionally) load data
#   docker compose up -d --build app   # build and start the API on :8080
#
# The app image has no Prisma CLI, so schema/seed run from the host (or `pnpm
# db:migrate`) against localhost:5432.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fishing_planet}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-fishing_planet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply committed migrations before the app starts, then exit. Uses
  # the builder stage, which has the Prisma CLI (the slim runtime image does not).
  init:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-fishing_planet}?schema=public
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-fishing_planet}?schema=public
      PORT: 8080
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Smoke test that runs only once the app reports healthy. Not started by a
  # normal `up` (test profile). Run it and get its exit code with:
  #   docker compose --profile test up --build --abort-on-container-exit --exit-code-from test
  test:
    image: node:22-alpine
    profiles: ["test"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:8080
    command:
      - node
      - -e
      - |-
        (async () => {
          const base = process.env.BASE_URL
          for (const path of ['/health', '/']) {
            const r = await fetch(base + path)
            if (r.status !== 200) throw new Error(`$${path} -> $${r.status}`)
            console.log(`ok $${path} -> 200`)
          }
          console.log('smoke tests passed')
        })().catch((e) => { console.error('FAIL', e.message); process.exit(1) })

volumes:
  pgdata:
