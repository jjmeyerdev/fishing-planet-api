components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'API key sent as `Authorization: Bearer <key>` (required for writes).'
  parameters:
    Limit:
      name: limit
      in: query
      description: Page size (1–100)
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    Offset:
      name: offset
      in: query
      description: Rows to skip
      schema: { type: integer, minimum: 0, default: 0 }
    Order:
      name: order
      in: query
      description: Sort direction (requires sort)
      schema: { type: string, enum: [asc, desc], default: asc }
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }
    WikiSlugPath:
      name: slug
      in: path
      required: true
      description: The wiki entity's unique slug.
      schema: { type: string }

  responses:
    BadRequest:
      description: Invalid request (malformed body, bad param/filter value)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Unique-constraint violation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServiceUnavailable:
      description: Database unavailable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until the limit resets
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]
    Page:
      type: object
      description: Pagination envelope; `data` is overridden per resource.
      properties:
        data:
          type: array
          items: {}
        total: { type: integer, description: Total rows matching the query }
        limit: { type: integer }
        offset: { type: integer }
      required: [data, total, limit, offset]

    Fish:
      type: object
      description: Decimal fields (weights in kg, credit rates) serialize as strings.
      properties:
        id: { type: integer }
        commonName: { type: string }
        scientificName: { type: string, nullable: true }
        family: { type: string, nullable: true }
        description: { type: string, nullable: true }
        isEventFish: { type: boolean }
        isMonster: { type: boolean }
        fpId: { type: integer, nullable: true }
        slug: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        weightYoungMin: { type: string, nullable: true }
        weightYoungMax: { type: string, nullable: true }
        weightCommonMin: { type: string, nullable: true }
        weightCommonMax: { type: string, nullable: true }
        weightTrophyMin: { type: string, nullable: true }
        weightUniqueMin: { type: string, nullable: true }
        weightUniqueMax: { type: string, nullable: true }
        monsterTargetWeight: { type: string, nullable: true }
        creditsPerKgCommon: { type: string, nullable: true }
        creditsPerKgTrophy: { type: string, nullable: true }
        creditsPerKgUnique: { type: string, nullable: true }
        xpCurveNotes: { type: string, nullable: true }
        farmingMetaTier: { type: string, nullable: true }
        notesFarming: { type: string, nullable: true }
        dataVersion: { type: string, nullable: true }
        lastVerified: { type: string, format: date-time, nullable: true }
      required: [id, commonName, isEventFish, isMonster]
    FishCreate:
      type: object
      properties:
        commonName: { type: string }
        scientificName: { type: string }
        family: { type: string }
        description: { type: string }
        isEventFish: { type: boolean }
        isMonster: { type: boolean }
        fpId: { type: integer }
        slug: { type: string }
        imageUrl: { type: string }
        weightYoungMin: { type: string }
        weightYoungMax: { type: string }
        weightCommonMin: { type: string }
        weightCommonMax: { type: string }
        weightTrophyMin: { type: string }
        weightUniqueMin: { type: string }
        weightUniqueMax: { type: string }
        monsterTargetWeight: { type: string }
        creditsPerKgCommon: { type: string }
        creditsPerKgTrophy: { type: string }
        creditsPerKgUnique: { type: string }
        xpCurveNotes: { type: string }
        farmingMetaTier: { type: string }
        notesFarming: { type: string }
        dataVersion: { type: string }
        lastVerified: { type: string, format: date-time }
      required: [commonName]
    FishUpdate:
      allOf: [ { $ref: '#/components/schemas/FishCreate' } ]
      description: Same writable fields as create; all optional.

    Location:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        region: { type: string }
        waterwayType: { type: string }
        unlockLevel: { type: integer }
      required: [id, name, region, waterwayType, unlockLevel]
    LocationCreate:
