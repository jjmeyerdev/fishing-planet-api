        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Fish'
                  - type: object
                    properties:
                      bitingPreference:
                        nullable: true
                        allOf: [ { $ref: '#/components/schemas/BitingPreference' } ]
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a fish
