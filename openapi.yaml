  /api/wiki/search:
    get:
      summary: Search across all wiki categories by name
      description: >-
        Case-insensitive substring match on name, fanned out across every wiki
        category. Returns one paginated flat list of category-tagged hits (ordered
        by category, then name); each hit links to its detail route
        /api/wiki/{category}/{slug}. Page through the merged result set with
        limit/offset; total is the full match count across all categories.
      operationId: searchWiki
      tags: [wiki]
      parameters:
        - { name: q, in: query, required: true, description: Search term (substring match on name), schema: { type: string } }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - { name: category, in: query, description: 'Comma-separated categories to restrict to (e.g. reels,baits)', schema: { type: string } }
