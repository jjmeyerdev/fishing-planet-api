openapi: 3.0.3
info:
  title: fishing-planet-api
  version: 0.1.0
  description: >
    REST API exposing Fishing Planet game data — fish, locations, their
    many-to-many presence, and per-fish biting preferences. List endpoints
    support pagination, filtering, and sorting and return a
    `{ data, total, limit, offset }` envelope.


    All `/api/*` endpoints are rate limited per client IP (default 100 requests
    per 60s window). Responses carry `RateLimit-Limit`, `RateLimit-Remaining`,
    and `RateLimit-Reset`; exceeding the limit returns `429` with a `Retry-After`
    header.


    Write operations (POST/PATCH/DELETE) require `Authorization: Bearer <API key>`
    (the `bearerAuth` scheme); reads are public. A missing or invalid key returns
    `401`.


    Every response carries an `X-Request-Id` header (echoed if the client sends
    one) that ties it to the server's structured JSON logs.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:8080
    description: Local (override the port with PORT)

paths:
  /:
    get:
      summary: Service info
      operationId: getRoot
      tags: [meta]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  status: { type: string }
  /health:
    get:
      summary: Liveness probe (does not touch the DB)
      operationId: getHealth
      tags: [meta]
      responses:
        '200':
          description: Process is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: healthy }
  /ready:
    get:
      summary: Readiness probe (pings the DB)
      operationId: getReady
      tags: [meta]
      responses:
        '200':
          description: DB reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
        '503':
          description: DB unreachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: unavailable }

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: getMetrics
      tags: [meta]
      responses:
        '200':
          description: Metrics in Prometheus text exposition format
          content:
            text/plain:
              schema: { type: string }

  /api/fish:
    get:
      summary: List fish
      operationId: listFish
      tags: [fish]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: q
          in: query
          description: Case-insensitive substring match on commonName
          schema: { type: string }
        - name: family
          in: query
          schema: { type: string }
        - name: isMonster
          in: query
          schema: { type: boolean }
        - name: isEventFish
          in: query
          schema: { type: boolean }
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, commonName, family, creditsPerKgUnique, monsterTargetWeight]
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: A page of fish
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Fish' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    post:
      summary: Create a fish
      operationId: createFish
      security: [ { bearerAuth: [] } ]
      tags: [fish]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FishCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Fish' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/fish/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      summary: Get a fish (includes its biting preference)
      operationId: getFish
      tags: [fish]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Fish'
                  - type: object
                    properties:
                      bitingPreference:
                        nullable: true
                        allOf: [ { $ref: '#/components/schemas/BitingPreference' } ]
                      baits:
                        type: array
                        items:
                          type: object
                          properties:
                            bait: { $ref: '#/components/schemas/Bait' }
                      lureTypes:
                        type: array
                        items:
                          type: object
                          properties:
                            lureType: { $ref: '#/components/schemas/LureType' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a fish
      operationId: updateFish
      security: [ { bearerAuth: [] } ]
      tags: [fish]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FishUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
