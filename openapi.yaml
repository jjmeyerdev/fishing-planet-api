        iconUrl: { type: string }
        chartUrl: { type: string }
        locationId: { type: integer }
      required: [fpId, name, slug, title, value, legacyValue, type, locationId]
    WeatherUpdate:
      allOf: [ { $ref: '#/components/schemas/WeatherCreate' } ]
      description: Same writable fields as create; all optional.

    # --- Wiki read-only dataset (scraped from wiki.fishingplanet.com) ---
    WikiLink:
      type: object
      description: A cross-category link stored as raw name + slug (FK-resolved where possible).
      properties:
        name: { type: string }
        slug: { type: string }
    WikiSpecies:
      type: object
      description: A fish species from the wiki (game-data fields; cross-links embedded on detail).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        latinName: { type: string, nullable: true }
        family: { type: string, nullable: true }
        description: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        wikipediaUrl: { type: string, nullable: true }
        commonWeightMaxKg: { type: number, nullable: true }
        trophyWeightMaxKg: { type: number, nullable: true }
        uniqueWeightMaxKg: { type: number, nullable: true }
        hookSizeMin: { type: string, nullable: true }
        hookSizeMax: { type: string, nullable: true }
      required: [id, slug, name]
    WikiSpeciesDetail:
      allOf:
        - $ref: '#/components/schemas/WikiSpecies'
        - type: object
          description: Adds the bait/lure/location cross-links; bait/lure links embed the resolved catalog row when matched.
          properties:
            baits:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/WikiLink'
                  - type: object
                    properties: { baitId: { type: integer, nullable: true }, bait: { type: object, nullable: true } }
            lures:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/WikiLink'
                  - type: object
                    properties: { lureId: { type: integer, nullable: true }, lure: { type: object, nullable: true } }
            locations:
              type: array
              items: { $ref: '#/components/schemas/WikiLink' }
    WikiBrand:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name]
    WikiReel:
      type: object
      description: A wiki reel (headline gear). List returns the parent; detail embeds brand/variants/technologies.
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string, description: 'spinning | casting | saltwater' }
        brandId: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiGear:
      type: object
      description: A wiki gear parent (rod/line/hook/sinker). Detail embeds brand + variants (+ technologies for rods).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        brandId: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiGearDetail:
      type: object
      description: A gear parent (reel/rod/line/hook/sinker) with its relations embedded on by-slug lookup.
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        description: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        brand:
          allOf: [ { $ref: '#/components/schemas/WikiBrand' } ]
          nullable: true
        variants:
          type: array
          description: Per-variant specs (columns of the source spec table).
          items: { type: object }
        technologies:
          type: array
          description: Technology links (reels/rods only); each embeds the technology row.
          items: { type: object }
      required: [id, slug, name, subtype]
    WikiBobber:
      type: object
      description: A wiki bobber (flat, one row per item).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        section: { type: string, nullable: true }
        color: { type: string, nullable: true }
        size: { type: string, nullable: true }
        material: { type: string, nullable: true }
        unlockLevel: { type: integer, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiLure:
      type: object
      description: A wiki lure parent; detail embeds its (color × size) variants.
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        description: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiLureDetail:
      allOf:
        - $ref: '#/components/schemas/WikiLure'
        - type: object
          properties:
            variants:
              type: array
              items: { type: object }
    WikiBait:
      type: object
      description: A flat consumable bait.
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        targetFish: { type: array, items: { type: string }, description: Raw species names (FK-resolved on the species side). }
        quantity: { type: integer, nullable: true }
        weightClass: { type: string, nullable: true }
        unlockLevel: { type: integer, nullable: true }
        hookSize: { type: string, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        priceNote: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiBoilie:
      type: object
      description: A boilie or pellet (flattened from the block-per-model source).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        flavour: { type: string, nullable: true }
        color: { type: string, nullable: true }
        buoyancy: { type: string, nullable: true }
        sizeMm: { type: string, nullable: true }
        unlockLevel: { type: integer, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiGroundbait:
      type: object
      description: A groundbait (flat catalogs + flattened mixes; subtype-specific fields null off-subtype).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        brand: { type: string, nullable: true }
        targetFish: { type: array, items: { type: string } }
        flavour: { type: string, nullable: true }
        aroma: { type: string, nullable: true }
        temperature: { type: string, nullable: true }
        unlockLevel: { type: integer, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiEquipment:
      type: object
      description: Apparel / storage / stringers-keepnets (subtype-specific fields null off-subtype).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        brand: { type: string, nullable: true }
        material: { type: string, nullable: true }
        storageCapacity: { type: string, nullable: true }
        unlockLevel: { type: integer, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        priceNote: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiTransport:
      type: object
      description: A vehicle (bass-boats, fishing-yachts, kayaks, motor-boats). Dimensions are raw strings.
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        engine: { type: string, nullable: true }
        passengerCapacity: { type: string, nullable: true }
        material: { type: string, nullable: true }
        lengthCm: { type: string, nullable: true }
        unlockLevel: { type: integer, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiOther:
      type: object
      description: Grab-bag item (fireworks, mission-items).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        description: { type: string, nullable: true }
        priceCredits: { type: integer, nullable: true }
        priceBaitcoins: { type: integer, nullable: true }
        priceNote: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiRig:
      type: object
      description: A leader / pre-tied rig product line — specs summarised to ranges / lists (lossy).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtype: { type: string }
        brand: { type: string, nullable: true }
        diameterMm: { type: string, nullable: true, description: min–max range }
        testLb: { type: string, nullable: true, description: min–max range }
        length: { type: string, nullable: true }
        colors: { type: string, nullable: true }
        unlockLevel: { type: string, nullable: true, description: level range }
        price: { type: string, nullable: true, description: price range or reward note }
        imageUrl: { type: string, nullable: true }
      required: [id, slug, name, subtype]
    WikiTechnology:
      type: object
      description: A gear technology (name-derived from gear, description enriched from the dedicated page).
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        category: { type: string, nullable: true, description: 'reel | rod' }
        description: { type: string, nullable: true }
      required: [id, slug, name]
    WikiSearchHit:
      type: object
      description: One search match; link to its detail via /api/wiki/{category}/{slug}.
      properties:
        category: { type: string, description: 'The wiki category (species, reels, baits, …)' }
        name: { type: string }
        slug: { type: string }
        subtype: { type: string, description: Present for categories that have a subtype. }
        imageUrl: { type: string, description: Present for categories that carry an image. }
      required: [category, name, slug]
    WikiSearchResults:
      type: object
      properties:
        query: { type: string }
        total: { type: integer, description: Total matches across all searched categories. }
        limit: { type: integer, description: Page size applied. }
        offset: { type: integer, description: Rows skipped into the merged result set. }
        results: { type: array, items: { $ref: '#/components/schemas/WikiSearchHit' } }
      required: [query, total, limit, offset, results]

